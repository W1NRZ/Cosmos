<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmos</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>
  <div class="app" id="app">
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>

    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18M3 12h18"/>
          </svg>
        </div>
        <div>
          <h1>Cosmos</h1>
          <p>Desktop backgrounds</p>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-item active" data-view="library">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
          Library
        </button>
        <button class="nav-item" data-view="customize">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3v2M12 19v2M5 12H3M21 12h-2M7.05 7.05 5.64 5.64M18.36 18.36l-1.41-1.41M7.05 16.95l-1.41 1.41M18.36 5.64l-1.41 1.41"/><circle cx="12" cy="12" r="4"/></svg>
          Customize
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="status-card" id="statusCard">
          <span class="status-dot"></span>
          <div>
            <strong id="statusLabel">Ready</strong>
            <small id="statusDetail">No wallpaper active</small>
          </div>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <h2 id="viewTitle">Library</h2>
          <p id="viewSubtitle">Your saved backgrounds</p>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-ghost" id="refreshBtn" title="Refresh">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
          </button>
          <button class="btn btn-primary" id="uploadBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 16V4m0 0 7 7m-7-7L5 11"/><path d="M20 18v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2"/></svg>
            Import
          </button>
        </div>
      </header>

      <section class="view view-active" id="libraryView">
        <div class="filters">
          <button class="chip active" data-filter="all">All</button>
          <button class="chip" data-filter="image">Images</button>
          <button class="chip" data-filter="gif">GIFs</button>
          <button class="chip" data-filter="video">Videos</button>
        </div>

        <div class="grid" id="libraryGrid"></div>

        <div class="empty-state hidden" id="emptyState">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10.5" r="1.5"/><path d="m21 16-5.5-5.5L5 21"/></svg>
          </div>
          <h3>No backgrounds yet</h3>
          <p>Import images, GIFs, or videos to build your library.</p>
          <button class="btn btn-primary" id="emptyUploadBtn">Import your first background</button>
        </div>
      </section>

      <section class="view" id="customizeView">
        <div class="customize-grid">
          <div class="panel">
            <h3>Colors</h3>
            <div class="control-row">
              <label>Accent</label>
              <input type="color" data-setting="theme.accent" id="accentColor">
            </div>
            <div class="control-row">
              <label>Background</label>
              <input type="color" data-setting="theme.background" id="bgColor">
            </div>
            <div class="control-row">
              <label>Text</label>
              <input type="color" data-setting="theme.text" id="textColor">
            </div>
          </div>

          <div class="panel">
            <h3>Layout</h3>
            <div class="control-row">
              <label>Spacing <span id="spacingVal">16px</span></label>
              <input type="range" min="8" max="32" step="2" data-setting="layout.spacing" id="spacingRange">
            </div>
            <div class="control-row">
              <label>Grid gap <span id="gridGapVal">18px</span></label>
              <input type="range" min="8" max="36" step="2" data-setting="layout.gridGap" id="gridGapRange">
            </div>
            <div class="control-row">
              <label>Corner radius <span id="radiusVal">14px</span></label>
              <input type="range" min="0" max="32" step="2" data-setting="layout.radiusMd" id="radiusRange">
            </div>
          </div>

          <div class="panel">
            <h3>Controls</h3>
            <div class="control-row">
              <label>Button opacity <span id="btnOpacityVal">72%</span></label>
              <input type="range" min="20" max="100" step="5" data-setting="controls.buttonOpacity" id="btnOpacityRange">
            </div>
            <div class="control-row">
              <label>Glass blur <span id="btnBlurVal">16px</span></label>
              <input type="range" min="0" max="40" step="2" data-setting="controls.buttonBlur" id="btnBlurRange">
            </div>
            <div class="control-row">
              <label>Card opacity <span id="cardOpacityVal">55%</span></label>
              <input type="range" min="20" max="100" step="5" data-setting="controls.cardOpacity" id="cardOpacityRange">
            </div>
            <div class="control-row">
              <label>Animation speed <span id="animSpeedVal">0.35s</span></label>
              <input type="range" min="10" max="80" step="5" data-setting="controls.animationSpeed" id="animSpeedRange">
            </div>
            <div class="control-row">
              <label>Corner style</label>
              <select data-setting="controls.cornerStyle" id="cornerStyle">
                <option value="rounded">Rounded</option>
                <option value="soft">Soft</option>
                <option value="sharp">Sharp</option>
                <option value="pill">Pill</option>
              </select>
            </div>
          </div>

          <div class="panel panel-actions">
            <button class="btn btn-ghost" id="resetSettingsBtn">Reset defaults</button>
            <button class="btn btn-primary" id="saveSettingsBtn">Save preferences</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast-stack" id="toastStack"></div>

  <script src="js/app.js"></script>
</body>
</html>
